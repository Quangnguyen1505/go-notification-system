syntax = "proto3";

package go.notification.system.proto.notificationapi;

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/quangnguyen1505/go-notification-system/proto/gen";

service NotificationService {
    rpc CreateNotification(CreateNotificationRequest) returns (CreateNotificationResponse) {
        option (google.api.http) = {
            post: "/v1/api/notification"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "Create notification"
            description: "Create notification on the server."
            tags: "notification"
        };        
    }

    rpc GetNotification(GetNotificationRequest) returns (GetNotificationResponse) {
        option (google.api.http) = {
            get: "/v1/api/notification/{notification_id}"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "Get notification"
            description: "Get notification on the server."
            tags: "notification"
        };
    }

    rpc BatchNotification(BatchNotificationRequest) returns (BatchNotificationResponse) {
        option (google.api.http) = {
            post: "/v1/api/notification:batch"
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "Batch notification"
            description: "Batch notification on the server."
            tags: "notification"
        };        
    }
}


message CreateNotificationRequest {
    string user_id = 1;
    repeated string channels = 2;
    string subject = 3;
    string body = 4;
    int64 schedule_at = 5; // optional
}

message CreateNotificationResponse {
    string notification_id = 1;
    string status = 2;
}

message GetNotificationRequest {
    string notification_id = 1;
}

message GetNotificationResponse {
    string notification_id = 1;
    string status = 2;    
}

message BatchNotificationRequest {
    repeated CreateNotificationRequest notifications = 1;
}

message BatchNotificationResponse {
    repeated BatchNotificationResult results = 1;
}

message BatchNotificationResult {
    string notification_id = 1;
    string status = 2;
    string error = 3;
}
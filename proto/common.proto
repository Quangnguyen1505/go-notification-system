syntax="proto3";

package go.notification.system.proto.common;

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/quangnguyen1505/go-notification-system/proto/gen";



option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
    info: {
        version: "1.0";
    };
    external_docs: {
        url: "https://github.com/Quangnguyen1505/go-notification-system";
        description: "go-notification-system repository";
    }
    schemes: HTTPS;
};

